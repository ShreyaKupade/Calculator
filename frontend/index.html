<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Neon Smart Calc</title>
</head>
<body>
    <div class="calculator">
        <div class="brand">NEON CALC</div>
        <input type="text" id="display" placeholder="0" disabled>
        <div class="buttons">
            <button onclick="clearDisplay()" class="btn-special">AC</button>
            <button onclick="deleteLast()" class="btn-special">DEL</button>
            <button onclick="appendValue('/')" class="btn-op">÷</button>
            <button onclick="appendValue('*')" class="btn-op">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="btn-op">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="btn-op">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()" id="equal-btn">=</button>
            
            <button onclick="appendValue('0')" class="btn-zero">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
